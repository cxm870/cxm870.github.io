# This file controls the settings for your Quarto template from www.marvinschmitt.com

# website settings
website:
  title: "Ching-Wen Mai"
  description: "Biostatistics student at CWRU who works with R and NHANES data"
  image: img/my_photo.png
  
  favicon: img/favicon.png
  
  # start of the navigation bar at the top of the website
  navbar:
    pinned: true
    logo: /img/logo.png
    
    # your sub-pages
    left:
      - icon: github
        href: https://github.com/cxm870
      - icon: linkedin
        href: https://www.linkedin.com/in/chingwen-m-119997273/
      - icon: envelope
        href: "mailto:cxm870@case.edu"


    
    # your social media handles
    right:
      - text: "About"
        href: index.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "CV"
        href: cv/index.qmd

  

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox
  page-footer: 
    left: |
      <span class="faux-block">&#169; 2023 Marvin Schmitt CC BY-SA 4.0</span>
    center: |
      <span class="faux-block"><a href="https://www.marvinschmitt.com/blog/website-tutorial-quarto/">View the tutorial for this template!</a></span>
    right: |
      <span class="faux-block"><a href="https://github.com/marvinschmitt/quarto-website-template/">View source on GitHub</a></span>

project:
  type: website
  output-dir: docs

  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.1em
    theme: 
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true